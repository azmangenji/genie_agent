<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIDAY</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --rc:  #00d4ff;
  --rc2: rgba(0,212,255,0.65);
  --rg:  rgba(0,212,255,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:100vw; height:100vh; overflow:hidden; font-family:'Orbitron',monospace; cursor:default; }
#bg { position:fixed; inset:0; z-index:0; }

.center-glow {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:700px; height:700px; border-radius:50%;
  background:radial-gradient(circle, var(--rg) 0%, transparent 68%);
  z-index:1; pointer-events:none;
  animation:glowBreathe 4s ease-in-out infinite; transition:background 1s;
}
@keyframes glowBreathe {
  0%,100%{ transform:translate(-50%,-50%) scale(1);    opacity:.8; }
  50%    { transform:translate(-50%,-50%) scale(1.18); opacity:1;  }
}

/* REACTOR */
.reactor-wrap {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:10; display:flex; flex-direction:column; align-items:center; gap:30px;
}
.reactor {
  position:relative; width:480px; height:480px;
  cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
}
.reactor:active { transform:scale(.985); }

.ring {
  position:absolute; border-radius:50%; top:50%; left:50%;
  transform:translate(-50%,-50%);
  transition:border-color .9s, box-shadow .9s;
}
.r1 { width:476px;height:476px; border:1px dashed var(--rc2); animation:cw 50s linear infinite; box-shadow:0 0 14px var(--rg),inset 0 0 14px var(--rg); opacity:.45; }
.r2 { width:400px;height:400px; border:2px solid transparent; border-top-color:var(--rc); border-right-color:var(--rc); animation:ccw 18s linear infinite; box-shadow:0 0 18px var(--rg); }
.r3 { width:328px;height:328px; border:1.5px solid var(--rc2); border-left-color:transparent; border-bottom-color:transparent; animation:cw 9s linear infinite; box-shadow:0 0 12px var(--rg); }
.r4 { width:258px;height:258px; border:3px solid transparent; border-top-color:var(--rc); border-bottom-color:var(--rc); animation:ccw 5.5s linear infinite; box-shadow:0 0 22px var(--rg); }
.r5 { width:198px;height:198px; border:1px solid var(--rc2); border-right-color:transparent; animation:cw 3s linear infinite; opacity:.75; }

@keyframes cw  { to { transform:translate(-50%,-50%) rotate(360deg);  } }
@keyframes ccw { to { transform:translate(-50%,-50%) rotate(-360deg); } }

.glow-orb {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:158px; height:158px; border-radius:50%;
  background:radial-gradient(circle, var(--rc2) 0%, var(--rg) 42%, transparent 72%);
  animation:orbPulse 2.8s ease-in-out infinite; transition:background .9s;
}
@keyframes orbPulse {
  0%,100%{ transform:translate(-50%,-50%) scale(1);    }
  50%    { transform:translate(-50%,-50%) scale(1.14); }
}

.core {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:118px; height:118px; display:flex; align-items:center; justify-content:center;
}
.core svg { width:100%; height:100%; filter:drop-shadow(0 0 10px var(--rc)) drop-shadow(0 0 22px var(--rc2)); transition:filter .9s; }

.center-pt {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:18px; height:18px; border-radius:50%; background:#fff;
  box-shadow:0 0 10px #fff,0 0 22px var(--rc),0 0 44px var(--rc);
  animation:ptPulse 2.2s ease-in-out infinite; transition:box-shadow .9s;
}
@keyframes ptPulse {
  0%,100%{ opacity:1;    box-shadow:0 0 10px #fff,0 0 22px var(--rc),0 0 44px var(--rc); }
  50%    { opacity:.72; box-shadow:0 0 6px  #fff,0 0 12px var(--rc),0 0 26px var(--rc); }
}

/* Sound waves */
.wave {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(1);
  width:480px; height:480px; border-radius:50%;
  border:1.5px solid var(--rc); opacity:0; pointer-events:none; transition:border-color .9s;
}
body.speaking .wave:nth-child(1){ animation:waveOut 2.4s ease-out 0s   infinite; }
body.speaking .wave:nth-child(2){ animation:waveOut 2.4s ease-out .7s  infinite; }
body.speaking .wave:nth-child(3){ animation:waveOut 2.4s ease-out 1.4s infinite; }
@keyframes waveOut {
  0%  { transform:translate(-50%,-50%) scale(.95); opacity:.55; }
  100%{ transform:translate(-50%,-50%) scale(1.72); opacity:0;  }
}

.state-label {
  font-size:12px; font-weight:300; letter-spacing:8px; text-transform:uppercase;
  color:var(--rc); text-shadow:0 0 12px var(--rc);
  animation:labelFade 2.5s ease-in-out infinite; transition:color .9s,text-shadow .9s;
}
@keyframes labelFade{ 0%,100%{opacity:1;} 50%{opacity:.45;} }

/* CORNERS */
.corner { position:fixed; z-index:20; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; line-height:2.2; color:rgba(0,212,255,.42); transition:color .9s; }
.corner-tl{ top:22px; left:26px; }
.corner-tr{ top:22px; right:26px; text-align:right; }
.brand { font-family:'Orbitron',monospace; font-size:18px; font-weight:700; letter-spacing:7px; color:var(--rc); text-shadow:0 0 14px var(--rc); transition:color .9s,text-shadow .9s; display:block; }
.clock-time { font-family:'Orbitron',monospace; font-size:15px; letter-spacing:3px; color:var(--rc); text-shadow:0 0 8px var(--rc); transition:color .9s; display:block; }

/* CHIPS */
.chip { position:fixed; bottom:26px; z-index:20; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--rc); border:1px solid var(--rg); padding:5px 14px; border-radius:2px; background:rgba(0,0,0,.6); text-transform:uppercase; transition:color .9s,border-color .9s; }
.chip-l{ left:26px; }
.chip-r{ right:26px; }

/* SUBTITLE */
.subtitle { position:fixed; bottom:76px; left:50%; transform:translateX(-50%); z-index:20; font-family:'Share Tech Mono',monospace; font-size:14px; letter-spacing:2px; color:var(--rc); text-shadow:0 0 8px var(--rc); max-width:68vw; text-align:center; line-height:1.65; pointer-events:none; transition:opacity .5s,color .9s; }
.subtitle.gone{ opacity:0; }

/* STATES */
body.listening  { --rc:#ff3355; --rc2:rgba(255,51,85,.7);   --rg:rgba(255,51,85,.22);  }
body.processing { --rc:#d0eeff; --rc2:rgba(208,238,255,.85); --rg:rgba(180,220,255,.2); }
body.speaking   { --rc:#00ff88; --rc2:rgba(0,255,136,.7);   --rg:rgba(0,255,136,.18);  }

body.listening  .r2,.r3,.r4,.r5 { /* handled via individual rules below */ }
body.listening  .r2 { animation-duration:6s;   }
body.listening  .r3 { animation-duration:3.5s; }
body.listening  .r4 { animation-duration:2s;   }
body.listening  .r5 { animation-duration:1.2s; }
body.listening  .glow-orb  { animation-duration:.9s; }
body.listening  .center-pt { animation-duration:.6s; }
body.processing .r1 { animation-duration:12s;  }
body.processing .r2 { animation-duration:3s;   }
body.processing .r3 { animation-duration:2s;   }
body.processing .r4 { animation-duration:1.2s; }
body.processing .r5 { animation-duration:.8s;  }
body.processing .glow-orb { animation-duration:.5s; }
body.speaking   .r2 { animation-duration:12s; }
body.speaking   .r4 { animation-duration:9s;  }
body.speaking   .glow-orb { animation-duration:1.4s; }
</style>
</head>
<body class="idle">

<canvas id="bg"></canvas>
<div class="center-glow"></div>

<div class="corner corner-tl">
  <span class="brand">FRIDAY</span>
  <span>EDA Intelligence · v3.2.0</span>
</div>
<div class="corner corner-tr">
  <span id="clockDate"></span>
  <span class="clock-time" id="clockTime"></span>
</div>

<!-- ONE-TIME ACTIVATION OVERLAY -->
<div id="activateOverlay" style="
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  background:rgba(0,0,0,0.92);cursor:pointer;
" onclick="activateFriday()">
  <div style="font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:10px;color:#00d4ff;text-shadow:0 0 20px #00d4ff;">FRIDAY</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:5px;color:rgba(0,212,255,0.6);animation:labelFade 2s ease-in-out infinite;">CLICK ANYWHERE TO ACTIVATE</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(0,212,255,0.3);margin-top:8px;">EDA INTELLIGENCE SYSTEM · v3.2.0</div>
</div>

<div class="chip chip-l" id="jobsChip">— RUNNING</div>
<div class="chip chip-r" id="lastChip">STANDBY</div>
<div class="subtitle gone" id="subtitle"></div>

<div class="reactor-wrap">
  <div class="reactor" id="reactor" onclick="handleTap()">
    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
    <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
    <div class="ring r4"></div><div class="ring r5"></div>
    <div class="glow-orb"></div>
    <div class="core">
      <svg viewBox="0 0 118 118" fill="none">
        <polygon points="59,4 104,29 104,89 59,114 14,89 14,29"   stroke="var(--rc)" stroke-width="1.5" fill="rgba(0,212,255,0.04)"/>
        <polygon points="59,17 90,34 90,84 59,101 28,84 28,34"    stroke="var(--rc)" stroke-width="0.9" fill="none" opacity=".55"/>
        <polygon points="59,30 78,41 78,77 59,88 40,77 40,41"     stroke="var(--rc)" stroke-width="0.7" fill="rgba(0,212,255,0.07)" opacity=".7"/>
        <line x1="59" y1="4"   x2="59"  y2="114" stroke="var(--rc)" stroke-width=".35" opacity=".28"/>
        <line x1="14" y1="29"  x2="104" y2="89"  stroke="var(--rc)" stroke-width=".35" opacity=".28"/>
        <line x1="104" y1="29" x2="14"  y2="89"  stroke="var(--rc)" stroke-width=".35" opacity=".28"/>
        <circle cx="59" cy="59" r="16"  stroke="var(--rc)" stroke-width="1" fill="rgba(0,212,255,0.13)"/>
        <circle cx="59" cy="59" r="6.5" fill="var(--rc)" opacity=".9"/>
      </svg>
    </div>
    <div class="center-pt"></div>
  </div>
  <div class="state-label" id="stateLabel">TAP TO ACTIVATE</div>
</div>

<script>
// PARTICLES
const canvas=document.getElementById('bg'), ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
window.addEventListener('resize',()=>{resize();buildP();});
resize();
function buildP(){
  const N=Math.max(60,Math.floor(W*H/13000));
  particles=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.4+.4}));
}
buildP();
const SC={idle:[0,212,255],listening:[255,51,85],processing:[200,228,255],speaking:[0,255,136]};
let pc=[0,212,255],curState='idle';
function l3(a,b,t){return a.map((v,i)=>v+(b[i]-v)*t);}
function frame(){
  ctx.clearRect(0,0,W,H);
  pc=l3(pc,SC[curState],.025);
  const[r,g,b]=pc.map(Math.round);
  const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.min(W,H)*.48);
  grd.addColorStop(0,`rgba(${r},${g},${b},.055)`);grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;else if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;else if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},.55)`;ctx.fill();
  });
  const D=165,D2=D*D;
  for(let i=0;i<particles.length;i++)
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d2=dx*dx+dy*dy;
      if(d2<D2){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(${r},${g},${b},${(1-Math.sqrt(d2)/D)*.11})`;ctx.lineWidth=.55;ctx.stroke();}
    }
  requestAnimationFrame(frame);
}
frame();

// CLOCK
function tickClock(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clockTime').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('clockDate').textContent=n.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}
setInterval(tickClock,1000);tickClock();

// STATE
const LABELS={idle:'ALWAYS LISTENING',listening:'I HEAR YOU…',processing:'PROCESSING…',speaking:'SPEAKING',muted:'MUTED — TAP TO UNMUTE'};
function setState(s){curState=s;document.body.className=s==='muted'?'idle':s;document.getElementById('stateLabel').textContent=LABELS[s];}

// SUBTITLE
let subT=null;
function showSub(text,persist){const el=document.getElementById('subtitle');el.textContent=text;el.classList.remove('gone');if(subT)clearTimeout(subT);if(!persist)subT=setTimeout(()=>el.classList.add('gone'),4500);}
function hideSub(){if(subT)clearTimeout(subT);document.getElementById('subtitle').classList.add('gone');}

// SPEECH RECOGNITION — continuous always-on
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null,muted=false,busy=false,restartPending=false;

function startListening(){
  if(!recog||muted||busy)return;
  try{recog.start();}catch(e){}
}

if(SR){
  recog=new SR();
  recog.continuous=true;
  recog.interimResults=true;
  recog.lang='en-US';

  recog.onspeechstart=()=>{ if(!busy) setState('listening'); };
  recog.onspeechend  =()=>{ if(!busy) setState('idle'); };

  recog.onresult=e=>{
    const results=Array.from(e.results);
    const last=results[results.length-1];
    const txt=last[0].transcript.trim();
    if(txt) showSub(`"${txt}"`,true);
    if(last.isFinal&&txt){
      busy=true;
      // Stop recognition while processing/speaking to avoid echo
      try{recog.stop();}catch(ex){}
      processCommand(txt);
    }
  };

  recog.onerror=e=>{
    if(e.error==='not-allowed'){ showSub('Microphone blocked — enable in Chrome flags.'); return; }
    if(e.error==='no-speech'||e.error==='aborted') return;
    showSub(`Mic: ${e.error}`);
  };

  // Auto-restart so FRIDAY never stops listening
  recog.onend=()=>{
    if(!muted&&!busy) setTimeout(startListening, 300);
  };
}

// SPEECH SYNTHESIS
let voice=null;
function loadVoice(){const voices=window.speechSynthesis.getVoices();const pref=['Google UK English Female','Samantha','Karen','Victoria','Fiona','Microsoft Zira'];voice=pref.reduce((f,n)=>f||voices.find(v=>v.name.includes(n)),null)||voices.find(v=>v.lang.startsWith('en'))||voices[0];}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=loadVoice;setTimeout(loadVoice,600);}

function speak(text,onDone){
  if(!window.speechSynthesis){busy=false;setState('idle');startListening();onDone?.();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(voice)u.voice=voice;u.rate=.87;u.pitch=.80;u.volume=1;
  setState('speaking');showSub(text,true);
  u.onend=u.onerror=()=>{
    busy=false;
    setState('idle');
    setTimeout(hideSub,2200);
    // Resume listening after speaking
    setTimeout(startListening,400);
    onDone?.();
  };
  window.speechSynthesis.speak(u);
}

// TAP = mute / unmute toggle
function handleTap(){
  if(curState==='processing'||curState==='speaking') return;
  if(muted){
    muted=false;
    setState('idle');
    startListening();
    showSub('Microphone unmuted.',false);
  } else {
    muted=true;
    try{recog.stop();}catch(e){}
    window.speechSynthesis.cancel();
    busy=false;
    setState('muted');
    showSub('Microphone muted. Tap to unmute.',false);
  }
}

// COMMAND PROCESSING
function localAnswer(t){
  const i=t.toLowerCase();
  if(/hello|hi friday|hey friday|good (morning|afternoon|evening)/.test(i))return'Online and ready, Engineer. All systems operational.';
  if(/\bstatus\b|how many.*running|what.*running/.test(i)){const n=parseInt(document.getElementById('jobsChip').textContent)||0;return`${n} job${n!==1?'s':''} currently running.`;}
  if(/what.*fail|any fail/.test(i))return'Querying failure logs. Standby.';
  if(/\b(time|clock)\b/.test(i)){const n=new Date(),p=v=>String(v).padStart(2,'0');return`Current time is ${p(n.getHours())} ${p(n.getMinutes())}.`;}
  if(/help|what can you|commands/.test(i))return'I can run CDC, Lint, SPG DFT, ECO, and full static checks. Report status, analyze results, and kill jobs. Just tell me what you need.';
  if(/shutdown|goodbye|power down/.test(i))return'Standing by, Engineer.';
  return null;
}

async function processCommand(text){
  setState('processing');showSub(`"${text}"`,true);
  const local=localAnswer(text);if(local){speak(local);return;}
  try{
    const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const d=await res.json();
    if(d.error&&!d.reply){speak('AI is offline, Engineer. Set the ANTHROPIC_API_KEY environment variable to enable it.');return;}
    if(d.tag) setTimeout(refreshJobs,4000);
    speak(d.reply||'Request processed.');
  }catch(e){speak('Cannot reach the FRIDAY server, Engineer. Please ensure the server is running.');}
}

// LIVE JOBS
async function refreshJobs(){
  try{const r=await fetch('/api/jobs?limit=25'),jobs=await r.json();if(!Array.isArray(jobs))return;const run=jobs.filter(j=>j.status==='running').length;document.getElementById('jobsChip').textContent=`${run} RUNNING`;if(jobs[0])document.getElementById('lastChip').textContent=`${jobs[0].type} · ${jobs[0].ip}`;}
  catch(e){document.getElementById('jobsChip').textContent='SERVER OFFLINE';}
}
refreshJobs();setInterval(refreshJobs,10000);

// STARTUP — wait for user click to unlock audio (Chrome requirement)
function activateFriday(){
  document.getElementById('activateOverlay').style.display='none';
  // Unlock speech synthesis with a silent utterance (user gesture context)
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(u);
  }
  refreshJobs();
  setTimeout(()=>{
    if(SR){
      speak('Good morning, Engineer. F R I D A Y online. Always listening. Tap the core to mute.');
    } else {
      showSub('Voice requires Chrome or Edge — allow microphone access');
      startListening();
    }
  }, 200);
}
</script>
</body>
</html>
